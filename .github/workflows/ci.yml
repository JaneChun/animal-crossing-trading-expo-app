name: CI

on:
    pull_request:
        branches: [master]

# PR 업데이트 시 이전 실행 중인 워크플로를 자동 취소
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ──────────────────────────────────────
    # 변경 감지
    # ──────────────────────────────────────
    changes:
        name: 📁 Check Changes
        runs-on: ubuntu-latest
        outputs:
            functions: ${{ steps.filter.outputs.functions }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      functions:
                          - 'functions/**'

    # ──────────────────────────────────────
    # 앱 Lint
    # ──────────────────────────────────────
    lint-app:
        name: 🔍 Lint (App)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

    # ──────────────────────────────────────
    # 앱 TypeCheck
    # ──────────────────────────────────────
    typecheck-app:
        name: 🛡️ TypeCheck (App)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run TypeScript type check
              run: npm run typecheck

    # ──────────────────────────────────────
    # Functions Lint
    # ──────────────────────────────────────
    lint-functions:
        name: 🔍 Lint (Functions)
        runs-on: ubuntu-latest
        needs: [changes]
        if: needs.changes.outputs.functions == 'true'
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: functions/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: functions

            - name: Run ESLint
              run: npm run lint
              working-directory: functions

    # ──────────────────────────────────────
    # Functions TypeCheck
    # ──────────────────────────────────────
    typecheck-functions:
        name: 🛡️ TypeCheck (Functions)
        runs-on: ubuntu-latest
        needs: [changes]
        if: needs.changes.outputs.functions == 'true'
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: functions/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: functions

            - name: Run TypeScript type check
              run: npm run typecheck
              working-directory: functions

    # ──────────────────────────────────────
    # Functions 빌드 (tsc 컴파일 확인)
    # ──────────────────────────────────────
    build-functions:
        name: 🔨 Build (Functions)
        runs-on: ubuntu-latest
        needs: [changes, typecheck-functions]
        if: needs.changes.outputs.functions == 'true'
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: functions/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: functions

            - name: Build
              run: npm run build
              working-directory: functions

    # ──────────────────────────────────────
    # Functions 단위 테스트 (항상 실행)
    # ──────────────────────────────────────
    test-functions:
        name: 🧪 Test (Functions)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: functions/package-lock.json

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21

            - name: Install dependencies
              run: npm ci
              working-directory: functions

            - name: Run tests with emulator
              run: npx firebase emulators:exec --project ${{ secrets.FIREBASE_PROJECT_ID }} "npm test"
              working-directory: functions
